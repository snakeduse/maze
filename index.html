<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maze</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        min-height: 100vh;
        background: #18202c;
        color: #f8efe0;
        font-family: Georgia, "Times New Roman", serif;
      }

      .app {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
        padding: 32px 16px;
      }

      h1 {
        margin: 0;
        font-size: 40px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .hud {
        color: #e9dcc7;
        font-size: 18px;
      }

      .health {
        width: min(100%, 360px);
      }

      .health-track {
        width: 100%;
        height: 18px;
        overflow: hidden;
        border: 2px solid #f8efe0;
        background: #392d2d;
      }

      .health-fill {
        width: 100%;
        height: 100%;
        background: #d92027;
      }

      .health-value {
        margin-top: 6px;
        color: #e9dcc7;
        font-size: 16px;
        text-align: center;
      }

      .status-panel {
        min-height: 28px;
        color: #f8efe0;
        font-size: 20px;
        font-weight: 700;
        text-align: center;
      }

      .status-panel:empty {
        visibility: hidden;
      }

      canvas {
        display: block;
        max-width: 100%;
        height: auto;
        border: 4px solid #f8efe0;
        background: #f4ead7;
      }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>Maze</h1>
      <div id="hud" class="hud"></div>
      <div class="health" aria-label="Player health">
        <div class="health-track" role="meter" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100">
          <div id="health-fill" class="health-fill"></div>
        </div>
        <div id="health-value" class="health-value">Health: 100%</div>
      </div>
      <div id="status" class="status-panel" aria-live="polite"></div>
      <canvas id="game" aria-label="Maze game"></canvas>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
